# House definition — Victorian mid-terrace, London
#
# PLACEHOLDER dimensions throughout — replace with real survey measurements.
# Marked with PLACEHOLDER comments so they are easy to grep for.
#
# Construction notes:
#   - Solid brick external walls (225 mm, uninsulated, plastered internally)
#   - Party walls both sides — adjacent dwellings assumed heated (no heat loss)
#   - Suspended timber ground floor (exposed void beneath)
#   - Single-glazed timber sash windows (original Victorian)
#   - Pitched roof, assumed 100 mm mineral wool insulation at joist level
#   - London design external temperature: −2 °C (BS EN 12831-1 Annex NA)

name: "Victorian mid-terrace"
location: "London, UK"

rooms:

  # ── Ground floor ────────────────────────────────────────────────────────────

  - name: "Front reception"
    floor_area_m2: 14.6    # PLACEHOLDER
    ceiling_height_m: 2.70  # PLACEHOLDER
    setpoint_c: 21.0        # MIS 3005-D living room default
    surfaces:
      - name: "Front external wall"
        surface_type: wall
        area_m2: 9.8        # PLACEHOLDER — full bay width × height minus window
        u_value_w_per_m2k: 1.9   # solid brick 225 mm plastered (CIBSE Guide A)
        adjacency: external
        orientation: N
      - name: "Front sash window"
        surface_type: window
        area_m2: 2.1        # PLACEHOLDER — typical Victorian bay sash
        u_value_w_per_m2k: 5.7   # single-glazed timber (CIBSE Guide A)
        adjacency: external
        orientation: N
      - name: "Left party wall"
        surface_type: wall
        area_m2: 9.5        # PLACEHOLDER
        u_value_w_per_m2k: 0.0   # party wall — no heat loss assumed
        adjacency: party
      - name: "Right party wall"
        surface_type: wall
        area_m2: 9.5        # PLACEHOLDER
        u_value_w_per_m2k: 0.0
        adjacency: party
      - name: "Floor"
        surface_type: floor
        area_m2: 14.6       # PLACEHOLDER — same as floor_area_m2
        u_value_w_per_m2k: 0.7   # suspended timber, uninsulated (BR 443)
        adjacency: ground
      - name: "Ceiling"
        surface_type: roof
        area_m2: 14.6       # PLACEHOLDER
        u_value_w_per_m2k: 0.0   # internal — bedroom above at same setpoint
        adjacency: internal
    radiators:
      - name: "Front reception radiator"
        rated_output_w: 1200  # PLACEHOLDER — to be replaced with surveyed output
        height_mm: 600        # PLACEHOLDER
        length_mm: 1200       # PLACEHOLDER

